name: Build EXE

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create config.yaml if not exists
      run: |
        if (!(Test-Path "config.yaml")) {
          New-Item -Path "config.yaml" -ItemType File -Force
          Add-Content -Path "config.yaml" -Value "# NQI工具配置文件"
          Add-Content -Path "config.yaml" -Value "# 请根据实际情况修改以下内容"
          Add-Content -Path "config.yaml" -Value ""
          Add-Content -Path "config.yaml" -Value "auth:"
          Add-Content -Path "config.yaml" -Value "  username: 'XXXXX'"
          Add-Content -Path "config.yaml" -Value "  password: 'XXXX'"
          Add-Content -Path "config.yaml" -Value ""
          Add-Content -Path "config.yaml" -Value "paths:"
          Add-Content -Path "config.yaml" -Value "  output_dir: './data_output'"
          Add-Content -Path "config.yaml" -Value "  cookie_dir: './cookies'"
          Add-Content -Path "config.yaml" -Value "  captcha_dir: './captcha_images'"
          Add-Content -Path "config.yaml" -Value "  log_dir: './logs'"
          Add-Content -Path "config.yaml" -Value ""
          Add-Content -Path "config.yaml" -Value "server:"
          Add-Content -Path "config.yaml" -Value "  base_url: 'https://nqi.gmcc.net:20443'"
        }

    - name: Build EXE using spec file
      run: |
        pyinstaller NqiTool.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: nqi_tool
        path: dist/NqiTool.exe